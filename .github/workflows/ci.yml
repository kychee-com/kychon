name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Seed smoke check
        run: npx tsx scripts/smoke-check-seeds.ts

      - name: Tests
        run: npm test

      - name: Lint
        run: npx biome check .

      - name: Type Check (Astro)
        run: npx astro check

      - name: Type Check (scripts)
        run: npx tsc --project tsconfig.scripts.json
